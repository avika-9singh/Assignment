<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
    <h1>Google Gemini</h1>
    <input type="text" id="input" placeholder="Ask Gemini...">
    <button id="btn">ask</button>
    <div id="msg"></div>
    
</body>
<script>
    let button= document.querySelector("#btn");
    let chat= document.querySelector("#msg");
    const API_KEY = "YOUR_API_KEY";
    const MASTER_PROMPT = `You are an empathetic social skills and psychology coach.
User will share real life social situations and mental struggles.

YOUR JOB:
- Listen carefully and validate their feelings first
- Identify the psychological pattern behind their problem
- Give 1-2 very specific actionable steps they can do TODAY
- Offer to role play social situations if needed
- Track their progress and refer to previous issues they shared

BEHAVIOUR:
- Never judge, never dismiss
- Use simple Hinglish — warm and friendly tone
- If situation is serious (self harm etc) — immediately recommend professional help
- Keep responses concise — no long paragraphs
- Ask one follow up question at the end always`;
    button.onclick = async function(){
        let userText = document.getElementById("input").value;
        if(userText === ""){return;}
        let p1 = document.createElement("p");
        p1.textContent = "User: " + userText;
        chat.appendChild(p1);
        input.value = "";
        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ //converts js object to json string
                    contents: [
                        {
                            parts: [{ text: MASTER_PROMPT   }]
                        },
                        {
                            parts: [{ text: userText }],
                        },
                    ],
                }), 
            },
        );
        const data = await response.json();
        let reply = data.candidates[0].content.parts[0].text;
        let p2 = document.createElement("p");
        p2.textContent = "Gemini: " + reply;
        chat.appendChild(p2);
    }

</script>
</html>
